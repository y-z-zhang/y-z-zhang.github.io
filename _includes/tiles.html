<section id="tiles" class="tiles">
  {% assign tile_pages = site.pages | where: "show_tile", true | sort: "order" %}
  {% for page in tile_pages %}
  <article>
    {% if page.image and page.hide-image != true %}
    <span class="image">
      <img src="{{ page.image }}" alt="{{ page.title | escape }}" loading="lazy" decoding="async" />
    </span>
    {% endif %}
    <header class="major">
      <h3><a href="{{ page.url | relative_url  }}" class="link">{{ page.title }}</a></h3>
      <p>{{ page.tile-description | default: page.description }}</p>
    </header>
  </article>
  {% endfor %}
</section>
