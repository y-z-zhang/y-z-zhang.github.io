<!-- Footer -->
	<footer id="footer">
		<div class="inner">
			<ul class="icons">
				{% if site.github_url %}
				<li><a href="{{ site.github_url }}" class="icon alt fa-github" target="_blank"><span class="label">GitHub</span></a></li>
				{% endif %}
				{% if site.lab_url %}
				<li><a href="{{ site.lab_url }}" class="icon alt fa-flask" target="_blank"><span class="label">AID Lab</span></a></li>
				{% endif %}
				{% if site.scholar_url %}
				<li><a href="{{ site.scholar_url }}" class="icon alt fa-graduation-cap" target="_blank"><span class="label">Google Scholar</span></a></li>
				{% endif %}
			</ul>
			<ul class="copyright">
				<li>&copy; {{ site.title }} </li>
				<li>Design: <a href="https://html5up.net" target="_blank">HTML5 UP</a></li>

			</ul>
		</div>
	</footer>

</div>

<!-- Scripts -->
	<script src="{{ "assets/js/jquery.min.js" | absolute_url }}"></script>
	<script src="{{ "assets/js/jquery.scrollex.min.js" | absolute_url }}"></script>
	<script src="{{ "assets/js/skel.min.js" | absolute_url }}"></script>
	<script src="{{ "assets/js/main.js" | absolute_url }}"></script>
